name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.8.26

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"

      - name: Install R package dependencies
        run: |
          Rscript -e 'install.packages(c("MatchIt", "WeightIt", "cobalt", "causaldata", "haven", "readr", "broom", "sandwich", "boot", "nlme"), repos = "https://cloud.r-project.org", Ncpus = max(1, parallel::detectCores() - 1L))'

      - name: Render Quarto site
        run: |
          cd docs
          quarto render

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          force_orphan: true
          enable_jekyll: false
