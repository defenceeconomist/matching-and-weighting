name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      R_VERSION: "4.4.1"
      R_LIBS_USER: ${{ github.workspace }}/.github-actions/R/library

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.8.26

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      - name: Create cached R library directory
        run: mkdir -p "$R_LIBS_USER"

      - name: Restore R package cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ env.R_VERSION }}-${{ hashFiles('.github/workflows/gh-pages.yml') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ env.R_VERSION }}-

      - name: Set up TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install R package dependencies
        shell: Rscript {0}
        run: |
          required_packages <- c(
            "knitr",
            "rmarkdown",
            "MatchIt",
            "WeightIt",
            "cobalt",
            "causaldata",
            "dplyr",
            "ggplot2",
            "haven",
            "readr",
            "broom",
            "sandwich",
            "boot",
            "nlme"
          )

          missing_packages <- required_packages[!vapply(
            required_packages,
            requireNamespace,
            logical(1),
            quietly = TRUE
          )]

          if (length(missing_packages) > 0) {
            install.packages(
              missing_packages,
              repos = "https://cloud.r-project.org",
              Ncpus = max(1L, parallel::detectCores() - 1L)
            )
          }

          installed <- vapply(required_packages, requireNamespace, logical(1), quietly = TRUE)
          if (!all(installed)) {
            stop(
              "Failed to install required R packages: ",
              paste(required_packages[!installed], collapse = ", ")
            )
          }

      - name: Render Quarto site
        run: |
          cd docs
          quarto render

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./docs/_site
          force_orphan: true
          enable_jekyll: false
