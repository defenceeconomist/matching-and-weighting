name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      R_VERSION: "4.4.1"
      QUARTO_VERSION: "1.8.26"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: ${{ env.QUARTO_VERSION }}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      - name: Restore Quarto execution cache
        uses: actions/cache@v4
        with:
          path: |
            docs/.quarto
            docs/_freeze
          key: ${{ runner.os }}-quarto-project-${{ env.QUARTO_VERSION }}-${{ hashFiles('docs/_quarto.yml', 'docs/**/*.qmd', 'docs/**/*.R') }}
          restore-keys: |
            ${{ runner.os }}-quarto-project-${{ env.QUARTO_VERSION }}-

      - name: Set up TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install and cache R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: true
          cache-version: 2
          packages: |
            any::sessioninfo
            any::knitr
            any::rmarkdown
            any::MatchIt
            any::WeightIt
            any::cobalt
            any::causaldata
            any::dplyr
            any::ggplot2
            any::haven
            any::readr
            any::broom
            any::sandwich
            any::boot
            any::nlme

      - name: Render Quarto site
        run: quarto render docs

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./docs/_site
          force_orphan: true
          enable_jekyll: false
