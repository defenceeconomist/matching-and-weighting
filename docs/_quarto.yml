project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - NEWS.md
    - articles/index.qmd
    - articles/matching_methods_report.qmd
    - articles/matching_synthesis_report.qmd
    - articles/propensity_score_weighting_companion.qmd
    - articles/effectbook_matching_notes.qmd
    - articles/mixtape_matching_subclassification_notes.qmd
    - articles/gertler_matching_notes.qmd
    - articles/matching_methods_report_full_code.qmd
    - articles/matching_methods_report_qa_log.qmd
    - labs/*.qmd
    - slides/*.qmd

website:
  title: "Matching and Weighting"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: NEWS.md
        text: News
      - href: articles/index.qmd
        text: Articles
      - href: labs/index.qmd
        text: Labs
      - href: slides/index.qmd
        text: Slides
  sidebar:
    - id: labs
      title: "Labs"
      style: "docked"
      contents:
        - labs/index.qmd
        - labs/lalonde_main_report_lab.qmd
        - labs/black_politicians_lab.qmd
        - labs/hisp_ie_practice_lab.qmd
        - labs/nsw_cps_benchmark_lab.qmd
        - labs/titanic_teaching_lab.qmd
    - id: slides
      title: "Slides"
      style: "docked"
      contents:
        - slides/index.qmd
        - slides/matching_workshop.qmd
        - slides/matching_workshop_notes.qmd

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true

execute:
  warning: false
  message: false
